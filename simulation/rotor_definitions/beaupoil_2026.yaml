# Beaupoil 2026 — RAWES Rotor Definition
# Hardware built and operated by Christof Beaupoil.
#
# Specification conventions follow helicopter/autogyro rotor literature:
#   Leishman (2006), Bramwell (2001), De Schutter (2018), Weyel (2025).
#
# Derived non-dimensional quantities (for reference, computed by RotorDefinition):
#   Solidity:    σ = N·c / (π·R) = 4×0.20 / (π×2.5) = 0.1019
#   Aspect ratio: AR = (R - r_root) / c = 2.0 / 0.20 = 10.0
#   Disk area:   A = π(R² - r_root²) = π(6.25 - 0.25) = 18.85 m²
#   Lock number: γ = ρ·a·c·R⁴ / I_b  (TBD — I_b not yet measured)
#   r_cp:        r_root + 2/3·(R - r_root) = 0.5 + 2/3×2.0 = 1.833 m

name: beaupoil_2026
description: >
  4-blade RAWES rotor, 1.5 m EPP RG30 foam blades + 1.0 m hub boom, SG6042 airfoil.
  Hub outer radius 0.5 m (r_root).  Total rotor radius 2.5 m (hub centre to blade tip).
  Designed and built by Christof Beaupoil.

rotor:
  # Fundamental geometry
  n_blades:      4          # N — number of blades
                             # Source: hardware (confirmed).

  radius_m:      2.5        # R — tip radius [m]
                             # Source: FlapRotor Blade Design doc: 1000 mm boom + 1500 mm blade = 2500 mm
                             # from hub centre.  The doc also mentions 2600 mm total — likely includes a
                             # hub adapter fitting.  2500 mm used here; confirm with tape measure on hardware.

  root_cutout_m: 0.5        # r_root — root cutout radius [m]  (hub outer radius = hub_diameter/2 = 1.0/2)
                             # Source: hardware design.  Confirm with calipers on hub outer diameter.

  chord_m:       0.20       # c — blade chord [m]  (constant along span)
                             # Source: FlapRotor Blade Design doc (measured from airfoil plotter screenshots: 200 mm).
                             # Measure: calipers at multiple span stations; confirm constant chord.

  twist_deg:     0.0        # θ_tw — linear twist root→tip [°]  (no twist)
                             # Source: FlapRotor Blade Design doc explicitly states "NO TWIST".
                             # NOT USED IN CURRENT MODEL — BEM aero uses constant AoA per strip.
                             # Confirm: protractor at root and tip on finished blade.

  taper_ratio:   1.0        # c_tip/c_root — chord taper  (rectangular blade)
                             # Source: FlapRotor Blade Design doc — blade photos show rectangular planform.
                             # NOT USED IN CURRENT MODEL — BEM assumes constant chord = chord_m.
                             # Confirm: calipers at root and tip.

airfoil:
  designation:       SG6040
  source:            "XFOIL polar from airfoiltools.com (xf-sg6040-il-500000), Re=500000, Ncrit=9; sg6040_re500k.csv"
  # ── Lift model:  CL = CL0 + CL_alpha · α ────────────────────────────────

  CL0:               0.393  # zero-AoA lift coefficient  [–]
                             # SOURCE: sg6040_re500k.csv — CL at α=0° reads 0.3925 directly.
                             # Least-squares fit over −4° to +9° gives intercept 0.379; direct
                             # read at 0° (0.393) preferred as it is not sensitive to fit range.
                             # MEASURE: XFOIL run on SG6040 at Re~490k; CL at α=0°.

  CL_alpha_per_rad:  5.79   # a = ∂CL/∂α  [/rad]
                             # SOURCE: sg6040_re500k.csv — least-squares fit over −4° to +9°: 5.788/rad.
                             # Consistent with finite-wing lifting-line theory:
                             #   CL_alpha_3D = 2π / (1 + 2/AR) = 2π/1.2 ≈ 5.24/rad (AR=10)
                             # SG6040 slightly exceeds lifting-line due to camber.
                             # MEASURE: slope of CL-α line from SG6040 XFOIL polar at Re~490k
                             # over linear range (≈ −4° to +8°).  Most important parameter —
                             # thrust scales linearly with CL_alpha.

  # ── Drag polar:  CD = CD0 + CL²/(π·AR·e) ───────────────────────────────

  CD_structural:     0.0    # C_{D,T} — no thin connecting cables in beaupoil design
                             # Blade roots attach directly to hub via rigid spar attachment.

  CD0:               0.0079 # zero-lift drag coefficient  [–]
                             # SOURCE: sg6040_re500k.csv — CD at zero-lift α=−3.54° reads 0.00793.
                             # CD at α=0° is 0.00852; minimum CD is 0.00793 at α=−3.75°.
                             # At Re=500k, SG6040 has very low profile drag (attached laminar flow).
                             # MEASURE: CD at zero lift from SG6040 XFOIL polar at Re~490k.

  oswald_efficiency: 0.8    # e — Oswald span efficiency factor  [–]
                             # SOURCE: standard engineering assumption for rectangular untwisted blades
                             # (typical range 0.7–0.9).  No measurement exists for this rotor.
                             # ASSUMPTION: low sensitivity — induced drag CL²/(π·AR·e) is small
                             # relative to CD0 at operating AoA (~5°).  Acceptable as-is.

  # Stall
  alpha_stall_deg:   13.0   # α_stall — AoA clamp for linear model validity [°]
                             # SOURCE: sg6040_re500k.csv — CL slope drops to ~35% of linear rate by
                             # α=13°; conservative clip for the linear BEM model.
                             # SG6040 at Re=500k has no sharp stall — CL rises slowly past 15°,
                             # so 13° marks the practical upper bound of the linear CL-α regime.
                             # ASSUMPTION: model clips at this value (does not simulate post-stall).

  # Empirical Re range — documentation only, NOT USED IN CURRENT MODEL
  Re_design:         127000 # Re at Beaupoil test rig operating conditions
                             # NOT USED IN MODEL — documentation only.
                             # Source: FlapRotor Blade Design doc p. 14 (calculated: 10 m/s wind,
                             # 45 RPM, r=1.0 m, c=200 mm, ν=1.571×10⁻⁵ m²/s → Re=127,301).

  Re_operating:      490000 # Re at r_cp in flight (= Ω·r_cp·c/ν ≈ 20×1.833×0.20/1.5e-5)
                             # NOT USED IN MODEL — documentation only.
                             # CSV polar is at Re=500k — within 2% of this value; coefficients apply.

inertia:
  # mass_kg is NOT set here — it is computed by the loader as:
  #   n_blades × blade_mass_kg + sum(stationary_assembly_mass_kg) + spinning_hub_shell_mass_kg
  # Update the three component sections below; mass_kg updates automatically.

  # Hub body inertia [I_xx, I_yy, I_zz] in principal body frame [kg·m²]
  # SOURCE: rough estimate — not measured.
  # MEASURE: bifilar pendulum suspension of fully assembled hub (blades on); or CAD mass properties.
  # Ixx=Iyy for symmetric 4-blade rotor; Izz ≈ 2×Ixx for flat disk approximation.
  I_body_kgm2:       [5.0, 5.0, 10.0]   # ESTIMATE

  # ── Blades (rotating) ─────────────────────────────────────────────────────
  # EPP RG30 foam (30 g/L) + fibreglass spar + carbon leading edge.
  # 1.5 m blade × 0.20 m chord × 30 g/L ≈ 90 g foam + spar/LE/hardware ≈ 350 g total.
  # MEASURE: kitchen scale, single blade off hub.
  blade_mass_kg:     0.35     # m_blade — per blade [kg]  ESTIMATE

  # ── Stationary assembly (does NOT rotate, excluded from I_spin) ───────────
  # Each entry is one component [kg].  Loader sums all values automatically.
  # MEASURE: postal/kitchen scale for each component individually before assembly.
  stationary_assembly_mass_kg:
    axle_aluminium_hollow_500mm:   0.30  # ESTIMATE
    gb4008_motor:                  0.19  # ESTIMATE — datasheet: 190 g
    pixhawk6c_and_pm:              0.05  # ESTIMATE
    revvitrc_esc_50a:              0.03  # ESTIMATE
    battery_4s_450mah:             0.10  # ESTIMATE
    ubec_wiring_misc:              0.12  # ESTIMATE
    lower_swashplate_and_bearings: 0.20  # ESTIMATE
    # Sum: 0.99 kg

  # ── Spinning hub shell (rotates with rotor, blades NOT included) ─────────
  # Outer hub shell + upper swashplate ring + push-rods + inner bearing races.
  # Does NOT include blade mass — blades are in blade_mass_kg above.
  # MEASURE: weigh spinning sub-assembly with blades removed (hub shell + upper ring + push-rods).
  spinning_hub_shell_mass_kg: 2.61  # ESTIMATE  (back-calculated: total − blades − stationary)

  # ── Derived I_spin (spinning parts only — stationary assembly excluded) ───
  #   I_blade    = m × (R² + R·r_root + r_root²) / 3
  #              = 0.35 × (6.25 + 1.25 + 0.25) / 3 = 0.904 kg·m² per blade
  #   I_hub_spin = spinning_hub_shell_mass_kg × r_root² / 2
  #              = 2.61 × 0.25 / 2 = 0.326 kg·m²
  #   I_spin     = 4 × 0.904 + 0.326 ≈ 3.94 kg·m²
  #   At ω = 20 rad/s → H = 78.8 kg·m²/s
  #
  # I_spin_kgm2: null = auto-compute from blade_mass_kg, or override explicitly.
  # Set 0.0 to disable gyroscopic coupling.
  I_spin_kgm2:       null     # I_s — null = compute from blade_mass_kg

  # Blade flap inertia about flap hinge (for Lock number calculation)
  I_blade_flap_kgm2: null     # I_b — TBD (not yet measured)
                               # NOT USED IN CURRENT MODEL — needed for Lock number γ = ρ·a·c·R⁴/I_b,
                               # which governs flap-lag coupling (not implemented in BEM model).
                               # MEASURE: torsional pendulum — suspend blade at flap hinge, measure
                               # oscillation period T; I_b = (T/2π)² × k_restoring.

# Lock number γ = ρ·a·c·R⁴ / I_b
# Governs aerodynamic/inertia coupling (high γ = aerodynamically stiff).
# Typical helicopters: γ = 5–12.  Cannot compute until I_b is measured.
# lock_number: null  # TBD

control:
  # Swashplate cyclic moment scaling
  # SOURCE: tuned empirically in simulation to give stable closed-loop response.
  # MEASURE: step-response test on hardware — apply known swashplate tilt, measure disk tilt rate.
  # Tether attachment offset along -body_Z from hub CoM [m].
  # Creates passive restoring torque M = r_attach × F_tether that aligns axle with tether.
  # Measured from hub CoM to bottom of axle where tether connects.
  axle_attachment_length_m: 0.3   # ESTIMATE — measure on hardware

  K_cyc: 0.4                 # cyclic moment gain: M_cyc = K_cyc·tilt_rad·T  ESTIMATE

  # Swashplate phase advance for gyroscopic precession compensation [°]
  # Theoretical: 90° for a CCW rotor.  Effective value depends on flap lag time constant.
  # SOURCE: not yet determined — TBD from hardware step-response test (ArduPilot H_PHANG).
  # Set 0.0 when gyroscopic coupling is disabled (I_spin_kgm2 = 0.0).
  swashplate_phase_deg: 0.0   # ESTIMATE — TBD from step-response test

  # ── Swashplate pitch authority (Kaman flap) ──────────────────────────────
  #
  # swashplate_pitch_gain_rad is the effective blade pitch angle [rad] at
  # normalised tilt = 1.0 (full cyclic deflection).
  #
  # For a Kaman flap system the chain is:
  #   swashplate push-rod travel → flap deflection γ → aerodynamic pitching
  #   moment → blade pitch β,   where  β = τ · γ  (τ = flap effectiveness).
  #
  # The static flap deflection γ_max CAN be measured without airflow:
  #   Command full cyclic (tilt = 1.0), secure the rotor stationary, and read
  #   the trailing-edge flap deflection angle with a digital inclinometer on
  #   the flap chord at mid-span.  Then:
  #     swashplate_pitch_gain_rad = τ · γ_max
  #   where τ = kaman_flap.tau (0.45 here — see kaman_flap section).
  #
  # The resulting blade pitch β only manifests in flight (the Kaman flap works
  # through an aerodynamic pitching moment, not a mechanical linkage to the
  # blade root), so static measurement gives γ only, not β directly.  To
  # measure β directly, a wind-tunnel test or a flight step-response is needed.
  #
  # Why it matters for trajectory planning:
  #   The disk tilts by gyroscopic precession when a cyclic moment is applied:
  #     ω_tilt_max = M_cyc_max / H,   H = I_spin · ω_eq  (angular momentum)
  #   where M_cyc_max scales with swashplate_pitch_gain_rad × CL_α × ω_eq² × R⁴.
  #   For this rotor: ω_tilt_max ≈ 20 rad/s — far above any useful planner rate.
  #   The planner slew rate (BODY_Z_SLEW_RATE) is limited by controller bandwidth
  #   to ~2–5% of ω_tilt_max (~0.4–1.0 rad/s).
  #   See RotorDefinition.max_body_z_rate_rad_s for the computed upper bound.
  #
  # ESTIMATE: τ · γ_max = 0.45 × 0.67 rad ≈ 0.30 rad (17.2°).
  # Assumes γ_max ≈ 38° (servo end-stop) and τ = 0.45 (kaman_flap.tau).
  # MEASURE: digital inclinometer on flap at full servo deflection; multiply by τ.
  swashplate_pitch_gain_rad: 0.3   # β_max = τ · γ_max [rad] at tilt = 1.0  ESTIMATE

  # ── Servo dynamics (DS113MG V6.0) ────────────────────────────────────────
  # Source: KST DS113MG V6.0 datasheet (openelab.io / spexdrone.com).
  #   Speed at 4.8 V: 0.13 s/60 deg = 462 deg/s
  #   Speed at 6.0 V: 0.11 s/60 deg = 545 deg/s
  #   Speed at 7.4 V: 0.10 s/60 deg = 600 deg/s
  #   Total travel:   +/-50 deg = 100 deg (NOT 60 deg as previously assumed)
  # Used by SwashplateServoModel in simtests and to set SIM_SERVO_SPEED in SITL.
  # SIM_SERVO_SPEED = servo_slew_rate_deg_s / servo_travel_deg = 545/100 = 5.45
  servo_slew_rate_deg_s: 545.0   # deg/s — DS113MG at 6 V (0.11 s/60 deg)
  servo_travel_deg:      100.0   # total angular travel of servo [deg] (+/-50 deg)

  kaman_flap:
    # Kaman servo-flap (US3217809, Kaman/Bossler 1965): trailing-edge control surface
    # on each blade driven by push-rods from the non-rotating swashplate.
    enabled: true

    # ── ALL kaman_flap PARAMETERS: NOT USED IN CURRENT MODEL ────────────────
    # Loaded and range-validated but do not flow into any aerodynamic calculation.
    # The BEM model uses collective + cyclic tilt directly; flap-to-pitch dynamics
    # are not yet modelled.  Reserved for future inner-loop flap controller (Weyel level B).

    # ── Geometry ─────────────────────────────────────────────────────────────
    chord_fraction: 0.25      # e_f = flap chord / blade chord  [–]
                              # GUESS: 0.25 (mid of typical 0.20–0.30 Kaman range).
                              # MEASURE: calipers on built blade — flap chord / blade chord at mid-span.

    span_start_m: 1.2         # inboard end of flap [m from rotation axis]
                              # GUESS: outer 65% of blade (r_root + 35%·span = 0.5 + 0.70 = 1.2 m).
                              # MEASURE: tape from rotation axis to inboard flap hinge.

    span_end_m: 2.5           # outboard end of flap [m from rotation axis]
                              # GUESS: extends to blade tip.
                              # MEASURE: tape from rotation axis to outboard flap hinge.

    # ── Aerodynamic effectiveness ─────────────────────────────────────────────
    tau: 0.45                 # τ — flap effectiveness ∂β_blade/∂γ_flap  [–]
                              # GUESS: 0.45 (mid of typical 0.3–0.6 for Kaman hardware at low Re).
                              # Thin-airfoil upper bound: √(1−e_f) = √0.75 ≈ 0.87.
                              # MEASURE: bench test — known flap deflection γ → measure blade pitch
                              # change β at zero airspeed; τ = Δβ/Δγ.

    CM_gamma_per_rad: -0.35   # ∂CM/∂γ — pitching moment slope per flap deflection  [/rad]
                              # GUESS: −0.35 from thin-airfoil estimate.
                              # Weyel 2025 Table 2 gives −0.5 for his 3-blade 0.15 m chord prototype
                              # (different geometry).  −0.35 not from any document — recalculate when
                              # flap geometry is finalised: ∂CM/∂γ ≈ −τ·CL_alpha·e_f/2.
                              # MEASURE: wind tunnel CM vs γ sweep on blade section with flap.

    swashplate_load_fraction: 0.1  # fraction of cyclic moment carried mechanically by swashplate  [–]
                              # GUESS: 0.1 (90% reduction — consistent with Kaman patent claims).
                              # MEASURE: strain gauge on push-rod at operating load; compare to
                              # calculated aerodynamic pitch moment.

    notes: >
      Push-rods from lower swashplate ring deflect trailing-edge flap on each blade.
      Flap aerodynamic moment pitches blade, providing cyclic/collective authority with
      minimal swashplate mechanical load.  See servoflaps.md and US3217809 (Kaman 1965).
      All geometry values are estimates — confirm from build.

# Anti-rotation drivetrain (hardware reference — not used in single-body simulation model)
# EMAX GB4008 66KV motor via 80:44 spur gear keeps the electronics assembly stationary.
# Control: Pixhawk yaw rate sensor → ATC_RAT_YAW_* PID → ESC torque modulation.
# Gear purpose: sets motor shaft to (80/44) × omega_rotor for efficient RPM range.
# All yaw authority comes from the control loop; the gear is an efficiency choice only.
# Simulation assumption: motor keeps electronics yaw perfectly at zero (single-body model).
# The only partial two-body assumption in the model is the gyroscopic calculation:
# I_spin excludes the stationary assembly mass, reflecting that the electronics hub does
# not rotate with the rotor.

# Autorotation spin dynamics (ODE, separate from 6-DOF body)
#
# dω_spin/dt = Q_spin / I_ode
# Q_spin = aerodynamic spin torque from BEM (aero.compute_forces().Q_spin)
#
autorotation:
  I_ode_kgm2:          10.0     # I_ode [kg·m²] — effective rotational inertia for spin ODE
                                 # SOURCE: rough estimate, ≈ 2.5× the structural I_spin (3.94 kg·m²).
                                 # Larger than I_spin because it captures added-mass effects of
                                 # the accelerated air column (actuator disk induced flow).
                                 # ASSUMPTION: only affects spin transient rate, not equilibrium ω_eq.
                                 # MEASURE: apply known step torque (e.g. briefly apply collective) and
                                 # measure ω(t) response; fit I_ode from dω/dt = Q_net / I_ode.

  omega_min_rad_s:     0.5      # ω_min — lower clamp [rad/s] — prevents divide-by-zero in ODE
                                 # ASSUMPTION: rotor below 0.5 rad/s (≈ 5 RPM) is effectively stalled.

  omega_eq_rad_s:      20.148   # ω_eq at design point — NOT USED IN MODEL, validation only.
                                 # Measured from simulation: settled spin at V_wind=10 m/s, default
                                 # tether orientation (test_steady_flight.py output).
                                 # MEASURE: optical tachometer or video at steady known wind speed.

environment:
  rho_kg_m3:           1.22     # ρ — air density [kg/m³]  (sea level, 15°C ISA)
                                 # ASSUMPTION: standard value, reasonable for low-altitude flight.
                                 # Adjust for local altitude and temperature if needed.
