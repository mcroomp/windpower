# De Schutter 2018 — RAWES Reference Rotor Definition
#
# Source: De Schutter J., Leuthold R., Diehl M. (2018).
#   "Optimal Control of a Rigid-Wing Rotary Kite System for Airborne Wind Energy"
#   IFAC Proceedings.  Full text: https://publications.syscop.de/DeSchutter2018.pdf
#
# All values taken directly from the paper unless marked [ESTIMATE].
#
# ── Geometry ──────────────────────────────────────────────────────────────────
# Paper uses: wing span L_w, connecting beam length L_b (optimised result).
# The three wings are mounted on carbon-fibre arms of length L_b that connect
# to a central rod.  Wing root is therefore at radial distance L_b from centre.
#
#   r_root = L_b = 1.60 m   (Table I "optimal design" result, Section IV-A)
#   R      = L_b + L_w = 1.60 + 1.50 = 3.10 m
#   span   = L_w = 1.50 m              (Table I)
#   chord  = L_w / A = 1.50 / 12 = 0.125 m  (Table I: A = 12)
#
# Actuator annulus area (Eq. 18):
#   A_K = π((L_b + L_w)² − L_b²) = π(3.10² − 1.60²) = 22.15 m²
#
# Centre of pressure (Section II-D, "two-thirds of wing span from root"):
#   r_cp = L_b + (2/3)·L_w = 1.60 + 1.00 = 2.60 m
#
# Derived non-dimensional:
#   Solidity:    σ = N·c / (π·R) = 3×0.125 / (π×3.1) = 0.0385
#   Aspect ratio: AR = span / chord = 1.50 / 0.125 = 12.0  ✓
#   Disk area:   A_K = π(R² − r_root²) = π(9.61 − 2.56) = 22.15 m²

name: de_schutter_2018
description: >
  3-blade RAWES reference from De Schutter et al. (2018) optimal control paper.
  Geometry and aerodynamics taken directly from the paper (Table I, Eq. 25).
  Mass/inertia use Weyel (2025) preliminary estimates as De Schutter does not
  specify these explicitly.  This is a mathematical reference — not actual hardware.

rotor:
  # Fundamental geometry — from De Schutter 2018
  n_blades:      3          # N — 3 blades (wings), 120° apart
  radius_m:      3.1        # R = L_b + L_w = 1.60 + 1.50 m  (Section IV-A result)
  root_cutout_m: 1.6        # r_root = L_b = 1.60 m  (optimised connecting arm length)
  chord_m:       0.125      # c = L_w / A = 1.50 / 12 = 0.125 m  (Table I: A=12, L_w=1.5m)
  twist_deg:     0.0        # no blade twist (stated in paper)
  taper_ratio:   1.0        # rectangular planform

airfoil:
  designation:       "De Schutter 2018 — thin airfoil, elliptical finite wing"
  source:            "De Schutter et al. 2018, Eq. 25 and Table I"
  #
  # De Schutter uses THIN AIRFOIL THEORY with Prandtl finite-wing correction (Eq. 25):
  #
  #   C_{L,k} = (2π / (1 + 2/A)) · α_k        (no CL0 term — symmetric/uncambered wing)
  #
  # For A = 12:
  #   CL_alpha = 2π / (1 + 2/12) = 2π / (7/6) = 12π/7 ≈ 5.385 /rad
  #
  # NOTE: This is NOT the SG6042 or SG6040 airfoil.  De Schutter explicitly uses
  # thin airfoil theory (from von Mises [18] in the paper), appropriate for his
  # optimisation study.  The paper contains no airfoil designation.

  CL0:               0.0    # zero — thin airfoil, symmetric wing assumption (Eq. 25)
  CL_alpha_per_rad:  5.385  # 2π/(1+2/12) = 12π/7  (De Schutter Eq. 25, A=12)
  CD0:               0.01   # C_{D,0} = 0.01  (De Schutter Table I)
  oswald_efficiency: 0.8    # O_e = 0.8  (De Schutter Table I)
  alpha_stall_deg:   15.0   # from De Schutter Eq. 28: |α_k| ≤ 15°, |β_k| ≤ 15°
  Re_design:         null   # not specified — thin airfoil theory is Re-independent

inertia:
  # De Schutter does not provide explicit mass or inertia values — they are
  # computed from structural parameters (Eq. 4) that require m'_S (mass per wing
  # area) which is not in Table I.  Values below are from Weyel (2025) Table 1,
  # labelled as "preliminary estimations" in his thesis.
  mass_kg:           40.0     # m — [ESTIMATE from Weyel 2025 Table 1]
  I_body_kgm2:       [20.0, 20.0, 40.0]   # J_r = [20,20,40]·I  [ESTIMATE Weyel 2025 Table 1]
  I_spin_kgm2:       0.0      # gyroscopic coupling disabled (De Schutter does not model spin)
  I_blade_flap_kgm2: null     # not stated

control:
  K_cyc: 0.4
  swashplate_pitch_gain_rad: 0.262  # β_max ≈ 15° (PITCH_MAX_DEG class default in DeSchutterAero)
                                     # De Schutter 2018 does not specify swashplate geometry;
                                     # this value matches the original DeSchutterAero hardcoded constant.
  aero_ramp_s: 5.0
  kaman_flap:
    enabled: false
    notes: >
      De Schutter 2018 commands blade pitch directly (abstract control input).
      No Kaman flap model.

autorotation:
  # De Schutter does not use an autorotation spin ODE — ω_θ is prescribed.
  # The paper gives ω_θ = 15π ≈ 47.12 rad/s (Weyel Table 1, for tip-speed-ratio λ=7).
  # K values below are order-of-magnitude estimates carried over from beaupoil_2026.
  K_drive_Nms_m:    1.4
  K_drag_Nms2_rad2: 0.01786
  I_ode_kgm2:       10.0
  omega_min_rad_s:  0.5
  omega_eq_rad_s:   null    # not calibrated for this rotor geometry

environment:
  rho_kg_m3: 1.22
